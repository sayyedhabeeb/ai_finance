# =============================================================================
# AI Financial Brain - ML Pipeline CI/CD
# Model training, validation, registry promotion, and drift detection
# =============================================================================

name: ML Pipeline

on:
  schedule:
    # Run retraining every Sunday at 2 AM UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      model_name:
        description: "Model to retrain (e.g., portfolio_optimizer, risk_analyzer)"
        required: true
        default: "portfolio_optimizer"
      training_days:
        description: "Number of days of historical data for training"
        required: false
        default: "365"
      promote_to_production:
        description: "Auto-promote to production if validation passes"
        required: false
        type: boolean
        default: false
  push:
    paths:
      - "src/ml/**"
      - "src/models/**"
      - "configs/ml/**"
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.11"
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

jobs:
  # ===========================================================================
  # Data Validation
  # ===========================================================================
  data-validation:
    name: Data Validation
    runs-on: ubuntu-latest
    outputs:
      data_valid: ${{ steps.validate.outputs.valid }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Validate training data
        id: validate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRAINING_DAYS: ${{ github.event.inputs.training_days || '365' }}
        run: |
          python -m src.ml.data_validation \
            --training-days "$TRAINING_DAYS" \
            --output /tmp/validation_report.json

          VALID=$(python -c "
          import json
          with open('/tmp/validation_report.json') as f:
              report = json.load(f)
          print('true' if report.get('is_valid', False) else 'false')
          ")
          echo "valid=$VALID" >> $GITHUB_OUTPUT

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: data-validation-report
          path: /tmp/validation_report.json

  # ===========================================================================
  # Model Training
  # ===========================================================================
  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: data-validation
    if: needs.data-validation.outputs.data_valid == 'true'
    outputs:
      run_id: ${{ steps.train.outputs.run_id }}
      metrics: ${{ steps.train.outputs.metrics }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Train model
        id: train
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MODEL_NAME: ${{ github.event.inputs.model_name || 'portfolio_optimizer' }}
          TRAINING_DAYS: ${{ github.event.inputs.training_days || '365' }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          OUTPUT=$(python -m src.ml.train \
            --model-name "$MODEL_NAME" \
            --training-days "$TRAINING_DAYS" \
            --experiment-name "aifb-$MODEL_NAME-retraining" \
            --output /tmp/training_report.json 2>&1)

          echo "$OUTPUT"

          # Extract run ID and metrics
          RUN_ID=$(python -c "
          import json
          with open('/tmp/training_report.json') as f:
              report = json.load(f)
          print(report.get('mlflow_run_id', 'unknown'))
          ")
          METRICS=$(python -c "
          import json
          with open('/tmp/training_report.json') as f:
              report = json.load(f)
          print(json.dumps(report.get('metrics', {})))
          ")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "metrics=$METRICS" >> $GITHUB_OUTPUT

      - name: Upload training report
        uses: actions/upload-artifact@v4
        with:
          name: training-report
          path: /tmp/training_report.json

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: /tmp/model_artifacts/

  # ===========================================================================
  # Model Validation
  # ===========================================================================
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    needs: train
    outputs:
      validation_passed: ${{ steps.validate.outputs.passed }}
      accuracy: ${{ steps.validate.outputs.accuracy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: /tmp/model_artifacts/

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run model validation
        id: validate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_RUN_ID: ${{ needs.train.outputs.run_id }}
        run: |
          python -m src.ml.validate \
            --run-id "$MLFLOW_RUN_ID" \
            --output /tmp/validation_results.json

          # Parse validation results
          PASSED=$(python -c "
          import json
          with open('/tmp/validation_results.json') as f:
              results = json.load(f)
          print('true' if results.get('passed', False) else 'false')
          ")
          ACCURACY=$(python -c "
          import json
          with open('/tmp/validation_results.json') as f:
              results = json.load(f)
          print(results.get('metrics', {}).get('accuracy', 0))
          ")
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "accuracy=$ACCURACY" >> $GITHUB_OUTPUT

          # Fail the step if validation failed
          if [ "$PASSED" = "false" ]; then
            echo "::error::Model validation failed. See validation_results.json for details."
            exit 1
          fi

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: /tmp/validation_results.json

  # ===========================================================================
  # Drift Check
  # ===========================================================================
  drift-check:
    name: Data & Concept Drift Check
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      drift_detected: ${{ steps.drift.outputs.detected }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: /tmp/model_artifacts/

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Check for data and concept drift
        id: drift
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_RUN_ID: ${{ needs.train.outputs.run_id }}
        run: |
          python -m src.ml.drift_detection \
            --run-id "$MLFLOW_RUN_ID" \
            --output /tmp/drift_report.json

          DETECTED=$(python -c "
          import json
          with open('/tmp/drift_report.json') as f:
              report = json.load(f)
          print('true' if report.get('drift_detected', False) else 'false')
          ")
          echo "detected=$DETECTED" >> $GITHUB_OUTPUT

          if [ "$DETECTED" = "true" ]; then
            echo "::warning::Drift detected! Model performance may have degraded."
          fi

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: /tmp/drift_report.json

  # ===========================================================================
  # Promote to Staging
  # ===========================================================================
  promote-staging:
    name: Promote to Staging
    runs-on: ubuntu-latest
    needs: [validate, drift-check]
    if: github.ref == 'refs/heads/develop' || (github.ref == 'refs/heads/main' && github.event.inputs.promote_to_production != 'true')
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Promote model to staging
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_RUN_ID: ${{ needs.train.outputs.run_id }}
        run: |
          pip install mlflow
          python -m src.ml.promote \
            --run-id "$MLFLOW_RUN_ID" \
            --stage staging \
            --model-name "aifb_model"

      - name: Notify staging promotion
        run: |
          echo "✅ Model promoted to staging"
          echo "Run ID: ${{ needs.train.outputs.run_id }}"
          echo "Validation Accuracy: ${{ needs.validate.outputs.accuracy }}"
          echo "Drift Detected: ${{ needs.drift-check.outputs.drift_detected }}"

  # ===========================================================================
  # Promote to Production
  # ===========================================================================
  promote-production:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: [validate, drift-check]
    if: |
      (github.ref == 'refs/heads/main' && github.event.inputs.promote_to_production == 'true') ||
      (github.event_name == 'schedule' && needs.drift-check.outputs.drift_detected == 'false')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Promote model to production
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_RUN_ID: ${{ needs.train.outputs.run_id }}
        run: |
          pip install mlflow
          python -m src.ml.promote \
            --run-id "$MLFLOW_RUN_ID" \
            --stage production \
            --model-name "aifb_model"

      - name: Trigger model reload in running pods
        run: |
          echo "Triggering model reload signal..."
          echo "Run ID promoted: ${{ needs.train.outputs.run_id }}"
          # In production, this would send a signal to reload models
          # kubectl exec -it deployment/backend-deployment -- python -c "from src.ml.model_manager import reload_models; reload_models()"

      - name: Notify production promotion
        run: |
          echo "🚀 Model promoted to PRODUCTION"
          echo "Run ID: ${{ needs.train.outputs.run_id }}"
          echo "Validation Accuracy: ${{ needs.validate.outputs.accuracy }}"
