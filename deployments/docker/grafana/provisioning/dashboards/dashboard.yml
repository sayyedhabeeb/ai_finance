# =============================================================================
# AI Financial Brain - Grafana Dashboard Provisioning
# =============================================================================

apiVersion: 1

providers:
  - name: "AI Financial Brain"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
