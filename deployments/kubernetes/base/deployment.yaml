# =============================================================================
# AI Financial Brain - Kubernetes Base Deployment
# =============================================================================
# Usage: kubectl apply -f deployment.yaml -n ai-financial-brain
# =============================================================================

# =============================================================================
# ConfigMap - Application Configuration
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: aifb-config
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: ai-financial-brain
    app.kubernetes.io/component: config
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  CORS_ORIGINS: "https://app.aifinancialbrain.com"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "aifb_db"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  WEAVIATE_URL: "http://weaviate-service:8080"
  MLFLOW_TRACKING_URI: "http://mlflow-service:5000"
  PREFECT_API_URL: "http://prefect-service:4200"
  PROMETHEUS_MULTIPROC_DIR: "/tmp/prometheus_multiproc"
---
# =============================================================================
# Secret - Sensitive Configuration
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aifb-secrets
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: ai-financial-brain
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://aifb_user:REPLACE_WITH_PASSWORD@postgres-service:5432/aifb_db"
  REDIS_URL: "redis://:REPLACE_WITH_PASSWORD@redis-service:6379/0"
  JWT_SECRET_KEY: "REPLACE_WITH_RANDOM_64_CHAR_STRING"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_MINUTES: "60"
  LLM_PROVIDER: "groq"
  GROQ_API_KEY: "REPLACE_WITH_GROQ_KEY"
  GROQ_MODEL: "llama3-70b-8192"
---
# =============================================================================
# Backend Deployment - FastAPI
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-financial-brain
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: ai-financial-brain
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: aifb-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/your-org/ai-financial-brain-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aifb-config
            - secretRef:
                name: aifb-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: backend-data-pvc
        - name: logs
          emptyDir:
            sizeLimit: 1Gi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: backend
---
# =============================================================================
# Frontend Deployment - Next.js
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: ai-financial-brain
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: ai-financial-brain
    spec:
      serviceAccountName: aifb-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: ghcr.io/your-org/ai-financial-brain-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aifb-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
# =============================================================================
# Sidecar - ML Pipeline Worker
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-worker-deployment
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: ml-worker
    app.kubernetes.io/component: ml
    app.kubernetes.io/part-of: ai-financial-brain
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ml-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ml-worker
        app.kubernetes.io/component: ml
        app.kubernetes.io/part-of: ai-financial-brain
    spec:
      serviceAccountName: aifb-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ml-worker
          image: ghcr.io/your-org/ai-financial-brain-backend:latest
          imagePullPolicy: Always
          command: ["python", "-m", "src.workers.ml_pipeline_worker"]
          envFrom:
            - configMapRef:
                name: aifb-config
            - secretRef:
                name: aifb-secrets
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /app/data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: backend-data-pvc
---
# =============================================================================
# PersistentVolumeClaim - Backend Data
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-data-pvc
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
# =============================================================================
# ServiceAccount
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aifb-service-account
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: ai-financial-brain
automountServiceAccountToken: false
---
# =============================================================================
# Service - Backend (ClusterIP)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
---
# =============================================================================
# Service - Frontend (LoadBalancer)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: ui
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:123456789012:certificate/your-cert-arn"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: http
      protocol: TCP
---
# =============================================================================
# Service - ML Worker (Headless for Prefect)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ml-worker-service
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: ml-worker
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: ml-worker
  ports:
    - name: worker
      port: 8081
      targetPort: 8081
      protocol: TCP
---
# =============================================================================
# HorizontalPodAutoscaler - Backend
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
      selectPolicy: Min
---
# =============================================================================
# HorizontalPodAutoscaler - Frontend
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: ai-financial-brain
  labels:
    app.kubernetes.io/name: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
      selectPolicy: Min
---
# =============================================================================
# PodDisruptionBudget - Backend
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: ai-financial-brain
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
---
# =============================================================================
# PodDisruptionBudget - Frontend
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: ai-financial-brain
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
---
# =============================================================================
# NetworkPolicy - Backend
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-network-policy
  namespace: ai-financial-brain
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: frontend
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: weaviate
      ports:
        - protocol: TCP
          port: 8080
    - to: # Allow DNS
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
